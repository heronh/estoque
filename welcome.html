<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Database Status</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .container {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #f8fafc;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .status {
            padding: 20px;
            border-radius: 12px;
            font-weight: 500;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status.warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .success .status-icon {
            background-color: #34d399;
            color: #0d9488;
        }

        .warning .status-icon {
            background-color: #fbbf24;
            color: #92400e;
        }

        .detail-box {
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 8px;
            padding: 15px;
            font-size: 0.9em;
            color: #94a3b8;
            text-align: left;
            word-wrap: break-word;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .detail-box strong {
            color: #cbd5e1;
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Teste de conexão com banco de dados</h1>

        {{if .Connected}}
        <div class="status success">
            <div class="status-icon">✓</div>
            Conexão com banco de dados bem sucedida
        </div>
        <div class="detail-box">
            <strong>Versão do PostgreSQL</strong>
            {{.Version}}
        </div>
        {{else}}
        <div class="status warning">
            <div class="status-icon">!</div>
            Database Connection Failed
        </div>
        <div class="detail-box">
            <strong>Warning Details</strong>
            {{.ErrorMsg}}
        </div>
        {{end}}
    </div>
</body>

</html>
